name: scan (scout + analyst)

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours (odd minute avoids top-of-hour congestion)
  workflow_dispatch: {}       # manual "Run workflow" button for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements.txt
      - run: pip install -r agents/requirements.txt
      - name: Run scout then analyst
        working-directory: agents
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          META_AD_LIBRARY_TOKEN: ${{ secrets.META_AD_LIBRARY_TOKEN }}
        run: python -m tide.orchestrator scout analyst operations
