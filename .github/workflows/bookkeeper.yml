name: daily books + protection

on:
  schedule:
    - cron: "45 5 * * *"     # daily, 05:45 UTC
  workflow_dispatch: {}

jobs:
  books:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/requirements.txt
      - run: pip install -r agents/requirements.txt
      - name: Sync stores and rebuild P&L
        working-directory: agents
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m tide.orchestrator bookkeeper sentinel
